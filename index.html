<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Nacional - Citas</title>
  <style>
    :root{
      --bg:#0f172a;
      --bg-soft:#111827;
      --card:#1f2937;
      --card-2:#0b1220;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --primary:#38bdf8;
      --border:#334155;
      --shadow:0 10px 25px rgba(0,0,0,.35);
      --radius:14px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:linear-gradient(180deg, #0b1020 0%, #0f172a 100%);
    }

    /* Header fijo */
    .topbar{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(15,23,42,.9);
      backdrop-filter: blur(8px);
      border-bottom:1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .topbar-inner{
      max-width:1300px;
      margin:0 auto;
      padding:14px 20px;
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      gap:16px;
    }
    .brand{
      grid-column:2;
      text-align:center;
      font-size:1.8rem;
      font-weight:800;
      letter-spacing:.4px;
      color:#fff;
    }

    .contact-card{
      grid-column:3;
      justify-self:end;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px 12px;
      min-width:260px;
    }
    .contact-title{
      font-weight:700;
      color:#fff;
      margin-bottom:8px;
      font-size:.95rem;
    }
    .contact-line{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:6px 0;
      font-size:.92rem;
      color:var(--text);
    }
    .contact-left{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }
    .icon{
      width:18px;
      text-align:center;
    }
    .contact-number{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      color:#dbeafe;
    }
    .copy-btn{
      border:1px solid var(--border);
      background:#0b1220;
      color:#cbd5e1;
      border-radius:8px;
      padding:6px 10px;
      cursor:pointer;
      font-size:.8rem;
      transition:.2s ease;
    }
    .copy-btn:hover{ border-color:var(--primary); color:#fff; }

    main{
      max-width:1300px;
      margin:22px auto;
      padding:0 20px 30px;
    }

    /* Tabs */
    .tabs{
      display:flex;
      gap:10px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }
    .tab-btn{
      border:1px solid var(--border);
      background:var(--bg-soft);
      color:var(--text);
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
    }
    .tab-btn.active{
      background:linear-gradient(135deg, #0ea5e9, #2563eb);
      border-color:transparent;
      color:#fff;
    }
    .tab-panel{ display:none; }
    .tab-panel.active{ display:block; }

    .panel-box{
      background:rgba(17,24,39,.78);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:16px;
      box-shadow: var(--shadow);
    }

    /* Herramienta 1 */
    .search-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    input[type="email"]{
      flex:1;
      min-width:260px;
      background:#0b1220;
      color:#e2e8f0;
      border:1px solid var(--border);
      border-radius:10px;
      padding:12px;
      outline:none;
    }
    input[type="email"]:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(56,189,248,.2);
    }
    .btn{
      border:none;
      background:linear-gradient(135deg, #0ea5e9, #2563eb);
      color:#fff;
      padding:12px 16px;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
    }
    .btn.secondary{
      background:#1e293b;
      border:1px solid var(--border);
    }

    .appointment-list{
      display:grid;
      gap:12px;
    }
    .appointment-item{
      background:var(--card-2);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
    }
    .item-title{
      margin:0 0 8px;
      font-size:1rem;
      color:#fff;
    }
    .meta{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:8px;
      color:#d1d5db;
      font-size:.92rem;
    }
    .meta b{ color:#93c5fd; }

    .hint, .error{
      margin-top:8px;
      font-size:.92rem;
    }
    .hint{ color:var(--muted); }
    .error{ color:#fecaca; }

    /* Herramienta 2 Dashboard */
    .board{
      display:grid;
      grid-template-columns:repeat(4, minmax(250px, 1fr));
      gap:14px;
      overflow-x:auto;
    }
    .column{
      background:rgba(2,6,23,.5);
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px;
      min-height:220px;
    }
    .column h3{
      margin:0 0 10px;
      font-size:1rem;
      padding:8px;
      border-radius:8px;
      text-align:center;
    }
    .s-agendado{ background:rgba(59,130,246,.2); color:#bfdbfe; }
    .s-pendiente{ background:rgba(245,158,11,.2); color:#fde68a; }
    .s-confirmado{ background:rgba(34,197,94,.2); color:#bbf7d0; }
    .s-cancelado{ background:rgba(239,68,68,.2); color:#fecaca; }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:10px;
      padding:10px;
      margin-bottom:10px;
    }
    .card p{
      margin:4px 0;
      font-size:.87rem;
      color:#e5e7eb;
    }
    .card .small{
      color:var(--muted);
      font-size:.8rem;
    }
    .change-box{
      margin-top:10px;
      border-top:1px dashed #475569;
      padding-top:8px;
    }
    .change-title{
      font-size:.8rem;
      color:#cbd5e1;
      margin-bottom:6px;
    }
    .state-btns{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }
    .state-btn{
      font-size:.75rem;
      border:1px solid var(--border);
      background:#0b1220;
      color:#e5e7eb;
      border-radius:7px;
      padding:6px 8px;
      cursor:pointer;
    }
    .state-btn:hover{
      border-color:var(--primary);
      color:#fff;
    }

    @media (max-width: 980px){
      .topbar-inner{
        grid-template-columns:1fr;
      }
      .brand{ grid-column:1; }
      .contact-card{
        grid-column:1;
        justify-self:stretch;
      }
      .board{
        grid-template-columns:repeat(1,minmax(280px,1fr));
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div></div>
      <div class="brand">Hospital Nacional</div>

      <aside class="contact-card">
        <div class="contact-title">Contáctenos</div>

        <div class="contact-line">
          <div class="contact-left">
            <span class="icon">📞</span>
            <span id="telefonoText" class="contact-number">******</span>
          </div>
          <button class="copy-btn" data-copy-target="telefonoText">Copiar</button>
        </div>

        <div class="contact-line">
          <div class="contact-left">
            <span class="icon">💬</span>
            <span id="whatsappText" class="contact-number">******</span>
          </div>
          <button class="copy-btn" data-copy-target="whatsappText">Copiar</button>
        </div>
      </aside>
    </div>
  </header>

  <main>
    <div class="tabs">
      <button class="tab-btn active" data-tab="tab-servicio">Herramienta 1: Servicio de Citas</button>
      <button class="tab-btn" data-tab="tab-dashboard">Herramienta 2: Dashboard de Citas</button>
    </div>

    <section id="tab-servicio" class="tab-panel active">
      <div class="panel-box">
        <h2>Buscar citas por correo electrónico</h2>
        <div class="search-row">
          <input type="email" id="emailInput" placeholder="Ejemplo: usuario@correo.com" />
          <button class="btn" id="searchBtn">Buscar</button>
          <button class="btn secondary" id="clearBtn">Limpiar</button>
        </div>
        <div id="searchMessage" class="hint">Ingrese un correo para consultar sus citas.</div>
        <div id="appointmentsResult" class="appointment-list"></div>
      </div>
    </section>

    <section id="tab-dashboard" class="tab-panel">
      <div class="panel-box">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
          <h2 style="margin:0;">Dashboard de citas</h2>
          <button class="btn secondary" id="refreshBoardBtn">Actualizar</button>
        </div>
        <div id="boardMessage" class="hint">Cargando dashboard...</div>
        <div class="board">
          <div class="column">
            <h3 class="s-agendado">Agendado</h3>
            <div id="col-Agendado"></div>
          </div>
          <div class="column">
            <h3 class="s-pendiente">Pendiente</h3>
            <div id="col-Pendiente"></div>
          </div>
          <div class="column">
            <h3 class="s-confirmado">Confirmado</h3>
            <div id="col-Confirmado"></div>
          </div>
          <div class="column">
            <h3 class="s-cancelado">Cancelado</h3>
            <div id="col-Cancelado"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = "https://69bc968a2bc2a25b22abe58e.mockapi.io/hospital/v1/Appointments";
    const STATUSES = ["Agendado","Pendiente","Confirmado","Cancelado"];

    // Tabs
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
        if (btn.dataset.tab === "tab-dashboard") loadDashboard();
      });
    });

    // Copiar contactos
    document.querySelectorAll(".copy-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const targetId = btn.getAttribute("data-copy-target");
        const text = document.getElementById(targetId)?.textContent?.trim() || "";
        try{
          await navigator.clipboard.writeText(text);
          const old = btn.textContent;
          btn.textContent = "Copiado";
          setTimeout(() => btn.textContent = old, 1200);
        }catch{
          alert("No se pudo copiar al portapapeles.");
        }
      });
    });

    // Herramienta 1: Buscar por email
    const emailInput = document.getElementById("emailInput");
    const searchBtn = document.getElementById("searchBtn");
    const clearBtn = document.getElementById("clearBtn");
    const searchMessage = document.getElementById("searchMessage");
    const appointmentsResult = document.getElementById("appointmentsResult");

    searchBtn.addEventListener("click", searchAppointments);
    emailInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") searchAppointments();
    });

    clearBtn.addEventListener("click", () => {
      emailInput.value = "";
      appointmentsResult.innerHTML = "";
      searchMessage.textContent = "Ingrese un correo para consultar sus citas.";
      searchMessage.className = "hint";
    });

    async function searchAppointments(){
      const email = emailInput.value.trim();
      if(!email){
        searchMessage.textContent = "Debe ingresar un correo electrónico.";
        searchMessage.className = "error";
        appointmentsResult.innerHTML = "";
        return;
      }

      searchMessage.textContent = "Buscando citas...";
      searchMessage.className = "hint";
      appointmentsResult.innerHTML = "";

      try{
        const res = await fetch(`${API_BASE}?email=${encodeURIComponent(email)}`);
        if(!res.ok) throw new Error("Error de red");
        const data = await res.json();

        if(!Array.isArray(data) || data.length === 0){
          searchMessage.textContent = "No se encontraron citas para ese correo.";
          searchMessage.className = "hint";
          return;
        }

        searchMessage.textContent = `Se encontraron ${data.length} cita(s).`;
        searchMessage.className = "hint";

        data.forEach(item => {
          const el = document.createElement("article");
          el.className = "appointment-item";
          el.innerHTML = `
            <h3 class="item-title">${item.firstName ?? ""} ${item.lastName ?? ""} — Apt ID: ${item.aptId ?? "-"}</h3>
            <div class="meta">
              <div><b>Email:</b> ${item.email ?? "-"}</div>
              <div><b>Teléfono:</b> ${item.phoneNumber ?? "-"}</div>
              <div><b>Sede:</b> ${item.appointmentLocation ?? "-"}</div>
              <div><b>Especialidad:</b> ${item.medicalSpecialty ?? "-"}</div>
              <div><b>Doctor:</b> ${item.assignedDoctor ?? "-"}</div>
              <div><b>Fecha:</b> ${item.appointmentDate ?? "-"}</div>
              <div><b>Hora:</b> ${item.appointmentTime ?? "-"}</div>
              <div><b>Estado:</b> ${item.appointmentStatus ?? "-"}</div>
            </div>
          `;
          appointmentsResult.appendChild(el);
        });
      }catch(err){
        searchMessage.textContent = "No se pudo consultar la API. Inténtelo de nuevo.";
        searchMessage.className = "error";
      }
    }

    // Herramienta 2: Dashboard
    const boardMessage = document.getElementById("boardMessage");
    const refreshBoardBtn = document.getElementById("refreshBoardBtn");
    refreshBoardBtn.addEventListener("click", loadDashboard);

    async function loadDashboard(){
      boardMessage.textContent = "Cargando dashboard...";
      boardMessage.className = "hint";
      clearColumns();

      try{
        const res = await fetch(API_BASE);
        if(!res.ok) throw new Error("Error de red");
        const data = await res.json();

        if(!Array.isArray(data) || data.length === 0){
          boardMessage.textContent = "No hay citas para mostrar.";
          return;
        }

        boardMessage.textContent = `Total de citas: ${data.length}`;
        data.forEach(renderCardInColumn);
      }catch(e){
        boardMessage.textContent = "No se pudo cargar el dashboard.";
        boardMessage.className = "error";
      }
    }

    function clearColumns(){
      STATUSES.forEach(s => {
        document.getElementById(`col-${s}`).innerHTML = "";
      });
    }

    function renderCardInColumn(item){
      const status = STATUSES.includes(item.appointmentStatus) ? item.appointmentStatus : "Pendiente";
      const col = document.getElementById(`col-${status}`);
      if(!col) return;

      // aptId como clave principal para PATCH; id como respaldo defensivo
      const appointmentKey = item.aptId ?? item.id;

      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        <p><strong>${item.firstName ?? ""} ${item.lastName ?? ""}</strong></p>
        <p class="small">Apt ID: ${item.aptId ?? "-"}</p>
        <p class="small">Key PATCH: ${appointmentKey ?? "-"}</p>
        <p><strong>Especialidad:</strong> ${item.medicalSpecialty ?? "-"}</p>
        <p><strong>Doctor:</strong> ${item.assignedDoctor ?? "-"}</p>
        <p><strong>Fecha:</strong> ${item.appointmentDate ?? "-"} - ${item.appointmentTime ?? "-"}</p>
        <p><strong>Email:</strong> ${item.email ?? "-"}</p>
        <div class="change-box">
          <div class="change-title">Cambiar el estado de la cita a</div>
          <div class="state-btns">
            ${STATUSES.filter(s => s !== status).map(s =>
              `<button class="state-btn" data-id="${appointmentKey ?? ""}" data-next="${s}">${s}</button>`
            ).join("")}
          </div>
        </div>
      `;
      col.appendChild(card);

      card.querySelectorAll(".state-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-id");
          const next = btn.getAttribute("data-next");
          await patchStatus(id, next, btn);
        });
      });
    }

    async function patchStatus(aptId, newStatus, buttonEl){
      if(!aptId){
        alert("No se encontró aptId para esta cita.");
        return;
      }

      const oldText = buttonEl.textContent;
      buttonEl.disabled = true;
      buttonEl.textContent = "Guardando...";

      try{
        const patchUrl = `${API_BASE}/${aptId}`;
        console.log("PATCH URL:", patchUrl, "BODY:", { appointmentStatus: newStatus });

        const res = await fetch(patchUrl, {
          method:"PATCH",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ appointmentStatus: newStatus })
        });

        if(!res.ok){
          const errText = await res.text();
          console.error("PATCH error:", res.status, errText);
          throw new Error("PATCH falló");
        }

        await loadDashboard();
      }catch(e){
        console.error(e);
        alert("No se pudo actualizar el estado de la cita.");
      }finally{
        buttonEl.disabled = false;
        buttonEl.textContent = oldText;
      }
    }

    // Carga inicial
    loadDashboard();
  </script>
</body>
</html>
