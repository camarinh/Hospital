<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Nacional - Gestión Integral</title>
  <style>
    :root{
      --bg:#0f172a; --panel:#111827; --card:#1f2937; --muted:#94a3b8; --text:#e5e7eb;
      --primary:#2563eb; --primary-2:#1d4ed8; --warning:#f59e0b; --border:#334155;
      --shadow:0 10px 25px rgba(0,0,0,.25); --radius:14px; --success:#4ade80;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:50;background:rgba(15,23,42,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
    .header-inner{max-width:1200px;margin:0 auto;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:12px;font-weight:700}
    .brand-badge{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,var(--primary),#7c3aed);box-shadow:var(--shadow)}
    .container{max-width:1200px;margin:24px auto;padding:0 20px 32px;display:grid;gap:20px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
    .tabs{display:flex;gap:8px;border-bottom:1px solid var(--border);padding:10px 10px 0}
    .tab{background:transparent;color:var(--muted);border:1px solid transparent;border-top-left-radius:10px;border-top-right-radius:10px;padding:10px 12px;cursor:pointer;font-weight:600}
    .tab.active{color:var(--text);background:var(--card);border-color:var(--border);border-bottom-color:var(--card)}
    .tab-content{display:none;padding:16px}
    .tab-content.active{display:block}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    input,select{width:100%;background:#0b1220;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:10px}
    .btn{border:0;border-radius:8px;padding:10px 16px;cursor:pointer;color:#fff;background:var(--primary);font-weight:600}
    .btn-clear{background:#475569}
    .kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;overflow-x:auto;margin-top:20px}
    .col{min-height:300px;background:#0b1220;border-radius:10px;padding:10px}
    .apt{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;font-size:0.9rem}
    .status-pill{font-size:0.7rem;padding:2px 8px;border-radius:10px;background:var(--border)}
    .btn-mini{padding:4px 8px;font-size:0.7rem;margin-top:5px;cursor:pointer;background:var(--border);color:white;border:none;border-radius:4px}
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand"><div class="brand-badge">HN</div><span>Hospital Nacional</span></div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <div class="tabs">
        <button class="tab active" data-tab="citasTab">Citas</button>
        <button class="tab" data-tab="dashboardTab">Dashboard Citas</button>
        <button class="tab" data-tab="pharmacyTab">Farmacia</button>
      </div>

      <div id="citasTab" class="tab-content active">...</div>
      <div id="dashboardTab" class="tab-content">...</div>
      
      <div id="pharmacyTab" class="tab-content">
        <div class="grid-2">
          <div>
            <h3>Nuevo Pedido</h3>
            <input id="p-first" placeholder="Nombre">
            <input id="p-last" placeholder="Apellido">
            <input id="p-phone" placeholder="Teléfono">
            <input id="p-email" placeholder="Email">
            <div id="med-inputs">
              <input list="meds" id="m1" placeholder="Medicina 1"><input type="number" id="q1" value="0" placeholder="Cant">
              <input list="meds" id="m2" placeholder="Medicina 2"><input type="number" id="q2" value="0" placeholder="Cant">
              <input list="meds" id="m3" placeholder="Medicina 3"><input type="number" id="q3" value="0" placeholder="Cant">
            </div>
            <button class="btn" onclick="submitOrder()">Request</button>
            <button class="btn btn-clear" onclick="clearForm()">Clear</button>
          </div>
          <div>
            <h3>Buscar Pedidos</h3>
            <input id="search-pharm" placeholder="Buscar por nombre o email...">
            <div id="search-results"></div>
          </div>
        </div>
        <div class="kanban" id="pharm-kanban">
          <div class="col" data-status="Requested"><h4>Requested</h4><div class="list"></div></div>
          <div class="col" data-status="Processing"><h4>Processing</h4><div class="list"></div></div>
          <div class="col" data-status="Ready for pickup"><h4>Ready</h4><div class="list"></div></div>
          <div class="col" data-status="Delivered"><h4>Delivered</h4><div class="list"></div></div>
        </div>
      </div>
    </section>
  </main>

  <datalist id="meds">
    <option value="Ibuprofen"> <option value="Paracetamol"> <option value="Loratadine"> <option value="Cetirizine"> <option value="Vitamin C">
    <option value="Aspirin"> <option value="Omeprazole"> <option value="Naproxen"> <option value="Diphenhydramine"> <option value="Pseudoephedrine">
    <option value="Guaifenesin"> <option value="Dextromethorphan"> <option value="Calcium"> <option value="Magnesium"> <option value="Zinc">
    <option value="Multivitamin"> <option value="Antacid"> <option value="Hydrocortisone"> <option value="Clotrimazole"> <option value="Petroleum Jelly">
  </datalist>

  <script>
    const PHARM_API = "https://69bc968a2bc2a25b22abe58e.mockapi.io/hospital/v1/Pharmacy";

    // Tab switcher
    document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", (e) => {
      document.querySelectorAll(".tab, .tab-content").forEach(el => el.classList.remove("active"));
      e.target.classList.add("active");
      document.getElementById(e.target.dataset.tab).classList.add("active");
    }));

    async function submitOrder() {
      const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
      const payload = {
        firstName: document.getElementById("p-first").value,
        lastName: document.getElementById("p-last").value,
        phoneNumber: document.getElementById("p-phone").value,
        email: document.getElementById("p-email").value,
        medication1: document.getElementById("m1").value || "N/A",
        quantity1: document.getElementById("q1").value || 0,
        medication2: document.getElementById("m2").value || "N/A",
        quantity2: document.getElementById("q2").value || 0,
        medication3: document.getElementById("m3").value || "N/A",
        quantity3: document.getElementById("q3").value || 0,
        Status: "Requested",
        deliveryDate: tomorrow.toLocaleDateString('en-US')
      };
      await fetch(PHARM_API, { method: "POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload) });
      loadPharmacy();
    }

    function renderCard(apt) {
      let meds = "";
      for(let i=1; i<=3; i++) {
        if(apt["medication"+i] && apt["medication"+i] !== "N/A" && apt["quantity"+i] > 0)
          meds += `<div>${apt["medication"+i]} (${apt["quantity"+i]})</div>`;
      }
      return `
        <div class="apt">
          <strong>${apt.firstName} ${apt.lastName}</strong><br>
          ${meds}
          <div style="margin-top:5px">Status: ${apt.Status}</div>
          <button class="btn-mini" onclick="updateStatus('${apt.id}', 'Processing')">Proc</button>
          <button class="btn-mini" onclick="updateStatus('${apt.id}', 'Ready for pickup')">Ready</button>
          <button class="btn-mini" onclick="updateStatus('${apt.id}', 'Delivered')">Done</button>
        </div>`;
    }

    async function loadPharmacy() {
      const res = await fetch(PHARM_API);
      const data = await res.json();
      document.querySelectorAll(".col .list").forEach(l => l.innerHTML = "");
      data.forEach(apt => {
        const col = document.querySelector(`.col[data-status="${apt.Status}"] .list`);
        if(col) col.insertAdjacentHTML("beforeend", renderCard(apt));
      });
    }

    async function updateStatus(id, newStatus) {
      const res = await fetch(`${PHARM_API}/${id}`, {
        method: "PUT", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({Status: newStatus})
      });
      loadPharmacy();
    }

    function clearForm() {
      document.querySelectorAll("input").forEach(i => i.value = "");
    }

    loadPharmacy();
  </script>
</body>
</html>
