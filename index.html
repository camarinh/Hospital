<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Nacional</title>
  <style>
    :root{
      --bg:#0f172a; --panel:#111827; --card:#1f2937; --muted:#94a3b8; --text:#e5e7eb;
      --primary:#2563eb; --primary-2:#1d4ed8; --warning:#f59e0b; --border:#334155;
      --shadow:0 10px 25px rgba(0,0,0,.25); --radius:14px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:50;background:rgba(15,23,42,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
    .header-inner{max-width:1200px;margin:0 auto;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:12px;font-weight:700}
    .brand-badge{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,var(--primary),#7c3aed);box-shadow:var(--shadow);font-size:.9rem;font-weight:800}
    .container{max-width:1200px;margin:24px auto;padding:0 20px 32px;display:grid;gap:20px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
    .card-body{padding:18px}
    .card-title{margin:0 0 14px}
    .contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
    .contact-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;align-items:center;justify-content:space-between}
    .meta{display:grid;gap:4px}
    .meta small{color:var(--muted)}
    .btn{border:0;border-radius:10px;padding:9px 12px;cursor:pointer;color:#fff;background:var(--primary);font-weight:600}
    .btn:hover{background:var(--primary-2)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .tabs{display:flex;gap:8px;border-bottom:1px solid var(--border);padding:10px 10px 0}
    .tab{background:transparent;color:var(--muted);border:1px solid transparent;border-top-left-radius:10px;border-top-right-radius:10px;padding:10px 12px;cursor:pointer;font-weight:600}
    .tab.active{color:var(--text);background:var(--card);border-color:var(--border);border-bottom-color:var(--card)}
    .tab-content{display:none;padding:16px}
    .tab-content.active{display:block}
    .search-row{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:14px}
    input{width:100%;background:#0b1220;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 12px;outline:none}
    .result-list{display:grid;gap:10px}
    .apt{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;display:grid;gap:8px}
    .apt-top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .pill{border:1px solid var(--border);border-radius:999px;padding:4px 10px;font-size:.78rem;color:var(--muted)}
    .kanban{display:grid;grid-template-columns:repeat(4,minmax(240px,1fr));gap:12px;overflow:auto}
    .col{min-height:320px;background:#0b1220;border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column}
    .col-head{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-weight:700}
    .col-body{padding:10px;display:grid;gap:10px;align-content:start}
    .status-agendado{color:#60a5fa}.status-pendiente{color:var(--warning)}.status-confirmado{color:#4ade80}.status-cancelado{color:#f87171}
    .apt-actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn-mini{padding:7px 9px;border-radius:8px;font-size:.8rem;border:1px solid var(--border);background:#111827;color:var(--text);cursor:pointer}
    .btn-mini:hover{border-color:#4b5563}
    .btn-mini:disabled{opacity:.45;cursor:not-allowed}
    .msg{margin-top:10px;color:var(--muted);font-size:.92rem}
    .ok{color:#4ade80}.err{color:#f87171}
    @media (max-width:1000px){.kanban{grid-template-columns:repeat(2,minmax(240px,1fr))}}
    @media (max-width:640px){.search-row{grid-template-columns:1fr}.kanban{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand"><div class="brand-badge">HN</div><span>Hospital Nacional</span></div>
      <small style="color:var(--muted)">Gestión de Citas</small>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <div class="card-body">
        <h3 class="card-title">Contáctenos</h3>
        <div class="contact-grid">
          <div class="contact-item">
            <div class="meta"><small>Teléfono</small><strong>+506 2222-3333</strong></div>
            <button class="btn" data-copy="+506 2222-3333">Copiar</button>
          </div>
          <div class="contact-item">
            <div class="meta"><small>WhatsApp</small><strong>+506 8888-9999</strong></div>
            <button class="btn" data-copy="+50688889999">Copiar</button>
          </div>
        </div>
        <div id="copyMsg" class="msg"></div>
      </div>
    </section>

    <section class="card">
      <div class="tabs">
        <button class="tab active" data-tab="citasTab">Servicio de Citas</button>
        <button class="tab" data-tab="dashboardTab">Dashboard</button>
      </div>

      <div id="citasTab" class="tab-content active">
        <div class="search-row">
          <input id="emailInput" type="email" placeholder="Ingrese email del paciente" />
          <button id="searchBtn" class="btn">Buscar</button>
        </div>
        <div id="searchResults" class="result-list"></div>
        <div id="searchMsg" class="msg"></div>
      </div>

      <div id="dashboardTab" class="tab-content">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
          <div class="msg" style="margin:0">Actualización por <strong>PUT</strong> + Webhook POST</div>
          <button id="reloadBtn" class="btn">Recargar</button>
        </div>

        <div class="kanban">
          <div class="col"><div class="col-head status-agendado">Agendado <span id="count-agendado">0</span></div><div id="col-agendado" class="col-body"></div></div>
          <div class="col"><div class="col-head status-pendiente">Pendiente <span id="count-pendiente">0</span></div><div id="col-pendiente" class="col-body"></div></div>
          <div class="col"><div class="col-head status-confirmado">Confirmado <span id="count-confirmado">0</span></div><div id="col-confirmado" class="col-body"></div></div>
          <div class="col"><div class="col-head status-cancelado">Cancelado <span id="count-cancelado">0</span></div><div id="col-cancelado" class="col-body"></div></div>
        </div>

        <div id="dashMsg" class="msg"></div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = "https://69bc968a2bc2a25b22abe58e.mockapi.io/hospital/v1/Appointments";
    const WEBHOOK_URL = "https://hooks.us.webexconnect.io/events/P0A7E5ZV0L";

    let APPOINTMENTS_CACHE = [];
    let isUpdating = false;

    // Tabs
    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.add("active");
      });
    });

    // Copy
    const copyMsg = document.getElementById("copyMsg");
    document.querySelectorAll("[data-copy]").forEach(btn => {
      btn.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(btn.dataset.copy);
          copyMsg.textContent = `Copiado: ${btn.dataset.copy}`;
          copyMsg.className = "msg ok";
        } catch {
          copyMsg.textContent = "No se pudo copiar automáticamente.";
          copyMsg.className = "msg err";
        }
      });
    });

    const normalizeStatus = (s = "") => {
      const v = String(s).trim().toLowerCase();
      if (v === "agendado") return "Agendado";
      if (v === "pendiente") return "Pendiente";
      if (v === "confirmado") return "Confirmado";
      if (v === "cancelado") return "Cancelado";
      return "Pendiente";
    };

    const getResourceId = (apt) => apt.aptId ?? apt.id;

    function setActionButtonsDisabled(disabled) {
      document.querySelectorAll(".btn-mini").forEach(b => b.disabled = disabled);
      document.getElementById("reloadBtn").disabled = disabled;
    }

    function cardHTML(apt) {
      const id = getResourceId(apt);
      const status = normalizeStatus(apt.appointmentStatus);
      return `
        <div class="apt" data-id="${id}">
          <div class="apt-top">
            <strong>${apt.firstName ?? ""} ${apt.lastName ?? ""}</strong>
            <span class="pill">#${id}</span>
          </div>
          <div><small style="color:var(--muted)">Email:</small> ${apt.email ?? "-"}</div>
          <div><small style="color:var(--muted)">Tel:</small> ${apt.phoneNumber ?? "-"}</div>
          <div><small style="color:var(--muted)">Fecha:</small> ${apt.appointmentDate ?? "-"}</div>
          <div><small style="color:var(--muted)">Hora:</small> ${apt.appointmentTime ?? "-"}</div>
          <div><small style="color:var(--muted)">Estado:</small> ${status}</div>
          <div class="apt-actions">
            ${["Agendado","Pendiente","Confirmado","Cancelado"]
              .filter(s => s !== status)
              .map(s => `<button class="btn-mini" onclick="updateStatus('${id}','${s}')" ${isUpdating ? "disabled" : ""}>${s}</button>`)
              .join("")}
          </div>
        </div>
      `;
    }

    async function fetchAppointments() {
      const res = await fetch(API_BASE);
      if (!res.ok) throw new Error(`GET failed: ${res.status}`);
      return res.json();
    }

    async function putAppointmentStatus(apt, newStatus) {
      const id = getResourceId(apt);
      const payload = { ...apt, appointmentStatus: newStatus };
      const res = await fetch(`${API_BASE}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(`PUT failed: ${res.status}`);
      return res.json();
    }

    async function postWebhook(updatedRecord) {
      const res = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(updatedRecord)
      });
      if (!res.ok) throw new Error(`Webhook failed: ${res.status}`);
      return res;
    }

    const emailInput = document.getElementById("emailInput");
    const searchBtn = document.getElementById("searchBtn");
    const searchResults = document.getElementById("searchResults");
    const searchMsg = document.getElementById("searchMsg");

    searchBtn.addEventListener("click", searchByEmail);
    emailInput.addEventListener("keydown", e => { if (e.key === "Enter") searchByEmail(); });

    async function searchByEmail() {
      const email = emailInput.value.trim().toLowerCase();
      searchResults.innerHTML = "";
      searchMsg.textContent = "";
      if (!email) {
        searchMsg.textContent = "Ingrese un email para buscar.";
        searchMsg.className = "msg err";
        return;
      }
      try {
        const data = await fetchAppointments();
        const matches = data.filter(a => (a.email || "").toLowerCase() === email);
        if (!matches.length) {
          searchMsg.textContent = "No se encontraron citas para ese email.";
          searchMsg.className = "msg";
          return;
        }
        searchResults.innerHTML = matches.map(cardHTML).join("");
        searchMsg.textContent = `Se encontraron ${matches.length} cita(s).`;
        searchMsg.className = "msg ok";
      } catch (err) {
        searchMsg.textContent = `Error al buscar: ${err.message}`;
        searchMsg.className = "msg err";
      }
    }

    const dashMsg = document.getElementById("dashMsg");
    const reloadBtn = document.getElementById("reloadBtn");
    reloadBtn.addEventListener("click", loadDashboard);

    function renderDashboard(list) {
      const cols = {
        Agendado: document.getElementById("col-agendado"),
        Pendiente: document.getElementById("col-pendiente"),
        Confirmado: document.getElementById("col-confirmado"),
        Cancelado: document.getElementById("col-cancelado")
      };
      Object.values(cols).forEach(el => el.innerHTML = "");
      list.forEach(apt => cols[normalizeStatus(apt.appointmentStatus)].insertAdjacentHTML("beforeend", cardHTML(apt)));
      document.getElementById("count-agendado").textContent = cols.Agendado.children.length;
      document.getElementById("count-pendiente").textContent = cols.Pendiente.children.length;
      document.getElementById("count-confirmado").textContent = cols.Confirmado.children.length;
      document.getElementById("count-cancelado").textContent = cols.Cancelado.children.length;
      setActionButtonsDisabled(isUpdating);
    }

    async function loadDashboard() {
      dashMsg.textContent = "Cargando citas...";
      dashMsg.className = "msg";
      try {
        APPOINTMENTS_CACHE = await fetchAppointments();
        renderDashboard(APPOINTMENTS_CACHE);
        dashMsg.textContent = `Citas cargadas: ${APPOINTMENTS_CACHE.length}`;
        dashMsg.className = "msg ok";
      } catch (err) {
        dashMsg.textContent = `Error cargando dashboard: ${err.message}`;
        dashMsg.className = "msg err";
      }
    }

    window.updateStatus = async function(id, newStatus) {
      if (isUpdating) return;

      isUpdating = true;
      setActionButtonsDisabled(true);
      dashMsg.textContent = `Actualizando #${id} a "${newStatus}"...`;
      dashMsg.className = "msg";

      try {
        const apt = APPOINTMENTS_CACHE.find(a => String(getResourceId(a)) === String(id));
        if (!apt) throw new Error("No se encontró la cita en caché.");

        const updated = await putAppointmentStatus(apt, newStatus);

        // update cache with server response (best source of truth)
        const idx = APPOINTMENTS_CACHE.findIndex(a => String(getResourceId(a)) === String(id));
        if (idx >= 0) APPOINTMENTS_CACHE[idx] = updated;

        renderDashboard(APPOINTMENTS_CACHE);

        // trigger webhook with the updated record
        await postWebhook(updated);

        dashMsg.textContent = `Cita #${id} actualizada y webhook enviado correctamente.`;
        dashMsg.className = "msg ok";
      } catch (err) {
        dashMsg.textContent = `No se pudo completar la operación: ${err.message}`;
        dashMsg.className = "msg err";
      } finally {
        isUpdating = false;
        setActionButtonsDisabled(false);
      }
    };

    loadDashboard();
  </script>

</html>
